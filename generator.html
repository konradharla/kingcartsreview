<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Carts Review Generator</title>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --primary-red: #ff1e1e;
            --accent-gold: #d4af37;
            --text-dark: #1a1a1a;
            --border-color: #e1e4e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-color);
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .brand-header {
            margin-bottom: 30px;
        }

        .logo-img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 15px;
        }

        h2.section-title {
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 25px 0;
        }

        .review-container {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px 25px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #333;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .review-text {
            font-style: italic;
        }

        .action-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 35px;
        }

        button {
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-generate {
            background-color: var(--primary-red);
            color: white;
        }

        .btn-generate:hover {
            background-color: #e01212;
        }

        .btn-copy {
            background-color: var(--accent-gold);
            color: white;
        }

        .btn-copy:hover {
            background-color: #c4a02e;
        }

        .btn-copy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 30px 0 20px 0;
        }

        .btn-google {
            display: inline-block;
            text-decoration: none;
            background-color: transparent;
            color: #1a73e8;
            border: 2px solid #1a73e8;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 25px;
        }

        .btn-google:hover {
            background-color: #1a73e8;
            color: white;
        }

        .thanks-msg {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-red);
        }

        .toast {
            visibility: hidden;
            min-width: 220px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 12px;
            position: fixed;
            z-index: 10;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
        }

        .toast.show {
            visibility: visible;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-header">
            <img src="https://growthzonesitesprod.azureedge.net/wp-content/uploads/sites/3048/2023/09/KingCartsLogo_BrightSpot-300x220.png" alt="King Carts Logo" class="logo-img">
        </div>

        <h2 class="section-title">Review Generator</h2>

        <div class="review-container">
            <div class="review-text" id="reviewDisplay">Click "Generate Review" to select an organic testimonial...</div>
        </div>

        <div class="action-group">
            <button class="btn-generate" onclick="generateReview()">Generate Review</button>
            <button class="btn-copy" id="copyBtn" onclick="copyReview()" disabled>Copy Text</button>
        </div>

        <div class="divider"></div>

        <a href="https://www.google.com/search?sca_esv=13d834516f12bbee&sxsrf=APpeQnv7SCPx-joKjwg3XagMwv8D3OcE2g:1784421913731&si=APenkKm7iecQ4G6P-TsbSMFKIQtv3EFIqRAFw-i8uEbk55Z-_wjE_bPIquiksZXqraZj9f4LZBwVMXBpzAWyY3tKuuiuzjsTbkFK9t3GbBiDJxAVPi4eXxRiAe0odkmouNMI0dNWnAvoA4NB9MUfzRNZ2I4JidrixA%3D%3D&q=King+Carts+Golf+Carts+Reviews&sa=X&ved=2ahUKEwi7j7DSwd2VAxV8jIkEHRCeOSAQ0bkNegQIMhAH&biw=1516&bih=761&dpr=2" 
           target="_blank" 
           class="btn-google">
           Go to Google Review Page
        </a>

        <div class="thanks-msg">dzienkujemy!!</div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        // Array uses simple structure to prevent commas from breaking code execution
        const reviewBank = [];
        reviewBank.push("shoutout to bart and the team at king carts!! picked up a custom lifted cart last week and it runs amazing.");
        reviewBank.push("Honestly the best golf cart spot around town. Bart really knows his stuff.");
        reviewBank.push("brought my cart in to fix a broken brake cable setup and the technicians sorted it out fast.");
        reviewBank.push("Great inventory selection on custom lithium models. Super easy process overall.");
        reviewBank.push("Def recommend checking out King Carts if you need an upgrade. Clean showroom and straightforward service.");
        reviewBank.push("Bart made sure we knew how all the digital screen features and switches worked.");
        reviewBank.push("Top notch service from start to finish. Delivered right to my driveway on time.");
        reviewBank.push("Cannot recommend this business enough! Best experience buying a golf cart hands down.");
        reviewBank.push("Helped us pick the perfect lift kit and matching tire configuration for our neighborhood.");
        reviewBank.push("The premium seating upgrades and matching dashboard look so premium. Thanks crew!");

        let currentReviewText = "";

        function generateReview() {
            const textDisplay = document.getElementById('reviewDisplay');
            const copyBtn = document.getElementById('copyBtn');
            
            const randomIndex = Math.floor(Math.random() * reviewBank.length);
            currentReviewText = reviewBank[randomIndex];
            
            textDisplay.innerText = '"' + currentReviewText + '"';
            copyBtn.disabled = false;
        }

        function copyReview() {
            if (!currentReviewText) return;
            
            navigator.clipboard.writeText(currentReviewText).then(function() {
                const toast = document.getElementById("toast");
                toast.className = "toast show";
                setTimeout(function() { toast.className = "toast"; }, 3000);
            }).catch(function(err) {
                console.error('Failed to copy: ', err);
            });
        }
    </script>
</body>
</html>
