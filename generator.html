        let currentReviewText = "";

        function generateReview() {
            if (reviewBank.length === 0) return;

            const textDisplay = document.getElementById('reviewDisplay');
            const copyBtn = document.getElementById('copyBtn');
            
            const randomIndex = Math.floor(Math.random() * reviewBank.length);
            currentReviewText = reviewBank[randomIndex];
            
            textDisplay.innerText = `"${currentReviewText}"`;
            copyBtn.disabled = false;
        }

        function copyReview() {
            if (!currentReviewText) return;
            
            navigator.clipboard.writeText(currentReviewText).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "toast show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
